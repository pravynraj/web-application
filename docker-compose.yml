version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://railbook_user:railbook_pass@db:5432/railbook_db
      - SECRET_KEY=your-super-secret-key-change-in-production
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - railbook_network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=railbook_user
      - POSTGRES_PASSWORD=railbook_pass
      - POSTGRES_DB=railbook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - railbook_network

volumes:
  postgres_data:

networks:
  railbook_network:
    driver: bridge
